<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content="width=device-width"><title>Git Subtree 使用 | The Developer Log of lingyin</title><link rel=stylesheet href=/css/main.4666f33dbfc52353dbae2f55c13eccd49ffeaf1a846b6fd0a2a49480170f4490.css integrity="sha256-RmbzPb/FI1Pbri9VwT7M1J/+rxqEa2/QoqSUgBcPRJA=" crossorigin=anonymous><script src=/js/main.23cd0c7d837263b9eaeb96ee2d9ccfa2969daa3fa00fa1c1fe8701a9b87251a1.js integrity="sha256-I80MfYNyY7nq65buLZzPopadqj+gD6HB/ocBqbhyUaE=" crossorigin=anonymous></script><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel=stylesheet></head><body><header></header><main><div class=page><article class=post><h1 class=post-title>Git Subtree 使用</h1><div class=post-content><h2 id=添加子树>添加子树</h2><p>使用 git subtree 将外部仓库添加到项目中：</p><div class=highlight><pre tabindex=0 class=chroma><code class=language-bash data-lang=bash><span class=line><span class=cl>git subtree add -P third-party/vendor/repo --squash &lt;repo-git&gt; master
</span></span></code></pre></div><h2 id=过滤-merge-提交>过滤 MERGE 提交</h2><p>使用正则表达式过滤合并提交：</p><pre tabindex=0><code class=language-regex data-lang=regex>^(?!Merge).*$
</code></pre></div></article></div></main><footer></footer></body></html>
